name: Release

# 仅在推送 v* 形式的 tag 时触发（如 v1.0.1）；不在 PR / fork 上触发，
# fork PR 默认也拿不到 secrets，避免被利用读取 NPM_TOKEN。
on:
  push:
    tags:
      - 'v*'

# 同一 tag 重复推送时，取消尚未完成的旧运行
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read   # 最小权限：只需读取代码
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'   # 自动用 NODE_AUTH_TOKEN 配置 .npmrc

      - name: 校验 tag 与 package.json 版本一致
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          echo "tag=$TAG package=$PKG"
          [ "$TAG" = "$PKG" ]

      - name: 发布到 npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}   # 从 GitHub Secrets 注入，不落盘、不在日志回显
